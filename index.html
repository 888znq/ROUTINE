<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Routine + Infinity Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Routine Colors */
            --bg-routine: #DFFF00; 
            --text-routine: #000000;
            /* Notes Colors */
            --phi: 1.618;
            --row-height: 80px; 
            --num-width: 60px; 
            --font-main: 1.5rem;
            --line-weight: 4px;
            --bg-notes: #000000;
            --red-notes: #FF0000;
            --line-style: var(--line-weight) solid var(--red-notes);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: var(--bg-routine);
            font-family: "Arial Black", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- ROUTINE SECTION --- */
        .routine-container {
            flex: 0 0 auto;
            padding: 8px;
            max-height: 60vh;
            overflow-y: auto;
            border-bottom: 5px solid #000;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            border: 2px solid var(--text-routine);
        }

        .cell {
            background: var(--bg-routine);
            aspect-ratio: 2/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--text-routine);
            border-bottom: 2px solid var(--text-routine);
            cursor: pointer;
            user-select: none;
        }

        .label { font-size: clamp(10px, 1.2vw, 16px); font-weight: 900; text-transform: uppercase; }
        .mark { font-size: clamp(16px, 2vw, 24px); font-weight: 700; }

        /* --- NOTES SECTION --- */
        .notes-app-section {
            flex: 1;
            background-color: var(--bg-notes);
            display: flex;
            flex-direction: column;
            position: relative;
            border-top: var(--line-style);
            counter-reset: note-counter;
        }

        #notes-list {
            flex: 1;
            overflow-y: auto;
            -webkit-mask-image: linear-gradient(to top, black 90%, transparent 100%);
        }

        .grid-row {
            display: grid;
            grid-template-columns: var(--num-width) 1fr;
            width: 100%;
            height: var(--row-height);
            border-top: var(--line-style);
        }

        .spacer-line {
            border-right: var(--line-style);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--red-notes);
        }

        .spacer-line.infinity::after { content: "∞"; font-size: 2rem; }
        .spacer-line.number::before {
            counter-increment: note-counter;
            content: counter(note-counter) ".";
            font-size: 1.1rem;
            font-family: 'Lexend Deca';
        }

        .note-content {
            width: 100%;
            height: 100%;
            background: var(--bg-notes);
            color: var(--red-notes);
            border: none;
            padding: 0 15px;
            font-family: 'Lexend Deca';
            font-size: var(--font-main);
            font-weight: 900;
            outline: none;
            display: flex;
            align-items: center;
            caret-color: var(--red-notes);
        }

        .status { position: fixed; top: 5px; right: 5px; background: #000; color: #DFFF00; padding: 2px 6px; font-size: 10px; z-index: 100; }

        /* Mobile Grid */
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="status" id="status">●</div>

<div class="routine-container">
    <div class="grid" id="mainGrid">
        <div class="cell"><div class="label">Wake Up</div></div>
        <div class="cell"><div class="label">Warm Water</div></div>
        <div class="cell"><div class="label">Pee</div></div>
        <div class="cell"><div class="label">Drink Water</div></div>
        <div class="cell"><div class="label">Wash Face</div></div>
        <div class="cell"><div class="label">Dry Face</div></div>
        <div class="cell"><div class="label">Poop</div></div>
        <div class="cell"><div class="label">Hand Wash</div></div>
        <div class="cell"><div class="label">Make Tea</div></div>
        <div class="cell"><div class="label">Drink Tea</div></div>
        <div class="cell"><div class="label">Cook Food</div></div>
        <div class="cell"><div class="label">Trading</div></div>
    </div>
</div>

<div class="notes-app-section">
    <div id="notes-list"></div>
    <div class="input-area grid-row">
        <div class="spacer-line infinity"></div>
        <div class="note-content" id="main-input" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyALIZB9_NDhqafx5kzSjsegMH0cVu_QGKM",
        authDomain: "routine-26663.firebaseapp.com",
        projectId: "routine-26663",
        storageBucket: "routine-26663.firebasestorage.app",
        messagingSenderId: "31432340805",
        appId: "1:31432340805:web:0fc427c8f94aef0d4cba2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const USER_ID = 'user_main';
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const notesList = document.getElementById('notes-list');
    const mainInput = document.getElementById('main-input');

    // --- ROUTINE LOGIC ---
    const updateStatus = (t, c) => { statusEl.textContent = t; statusEl.style.background = c; };

    const saveRoutine = async () => {
        const state = Array.from(cells).map(c => c.querySelector('.mark')?.textContent || '✗');
        await setDoc(doc(db, 'routines', USER_ID), { state, lastUpdated: new Date().toISOString() });
        updateStatus('☁ Saved', '#00ff00');
    };

    document.getElementById('mainGrid').addEventListener('click', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const m = cell.querySelector('.mark');
        m.textContent = m.textContent === '✗' ? '✓' : '✗';
        saveRoutine();
    });

    // --- NOTES LOGIC ---
    function saveNotes() {
        const notes = Array.from(document.querySelectorAll('#notes-list .note-content')).map(n => n.innerText);
        localStorage.setItem('infinity_notes_unified', JSON.stringify(notes));
    }

    function createNoteRow(text) {
        const row = document.createElement('div');
        row.className = 'grid-row';
        row.innerHTML = `
            <div class="spacer-line number"></div>
            <div class="note-content" contenteditable="true">${text}</div>
        `;
        const content = row.querySelector('.note-content');
        content.addEventListener('keyup', saveNotes);
        content.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                const newRow = createNoteRow("");
                row.insertAdjacentElement('afterend', newRow);
                newRow.querySelector('.note-content').focus();
            }
        });
        return row;
    }

    mainInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && mainInput.innerText.trim() !== "") {
            e.preventDefault();
            notesList.appendChild(createNoteRow(mainInput.innerText));
            mainInput.innerText = "";
            saveNotes();
            notesList.scrollTop = notesList.scrollHeight;
        }
    });

    // --- INIT ---
    window.addEventListener('load', async () => {
        // Load Routine
        const docSnap = await getDoc(doc(db, 'routines', USER_ID));
        const savedRoutine = docSnap.exists() ? docSnap.data().state : [];
        cells.forEach((c, i) => {
            const m = document.createElement('div');
            m.className = 'mark';
            m.textContent = savedRoutine[i] || '✗';
            c.appendChild(m);
        });

        // Load Notes
        const savedNotes = JSON.parse(localStorage.getItem('infinity_notes_unified') || '[]');
        savedNotes.forEach(t => notesList.appendChild(createNoteRow(t)));
        mainInput.focus();
    });
</script>
</body>
</html>
