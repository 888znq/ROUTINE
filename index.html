<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>Trinity OS - Sharp</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050505;
            --bg-win: #000;
            --red: #FF0000;
            --green: #00FF00;
            /* SHARP EDGES - Set to 0 */
            --radius: 0px; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-body);
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 40px 40px;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Lexend Deca', sans-serif;
            touch-action: none;
            /* Global Screen Border */
            border: 4px solid var(--red);
        }

        /* --- DRAG SHIELD --- */
        #drag-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: none; cursor: grabbing;
        }
        body.dragging #drag-shield { display: block; }

        /* --- WINDOW CONTAINER --- */
        .app-window {
            position: absolute;
            background: var(--bg-win);
            border: 2px solid var(--red);
            border-radius: var(--radius); /* 0px */
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 0 1px #000; /* Sharp separation shadow */
            min-width: 140px;
            min-height: 140px;
            overflow: hidden;
            container-type: size; 
        }

        /* --- INVISIBLE HEADER --- */
        .window-header {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 35px;
            z-index: 100;
            cursor: grab;
            background: transparent;
            user-select: none;
        }
        .window-header:active { cursor: grabbing; }

        /* --- CONTENT --- */
        .window-content {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        /* --- INVISIBLE RESIZER --- */
        .resize-handle {
            position: absolute;
            bottom: 0; right: 0;
            width: 40px; height: 40px;
            cursor: se-resize;
            z-index: 200;
            background: transparent;
            touch-action: none;
        }

        /* === APP 1: ROUTINE === */
        #win-routine { width: 300px; height: 420px; top: 20px; left: 20px; z-index: 10; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(max(70px, 25cqi), 1fr));
            gap: 1px;
            background: var(--red);
            border-top: 2px solid var(--red);
            margin-top: 0px; 
            min-height: 100%;
        }
        .cell {
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            background: #000; cursor: pointer; user-select: none;
        }
        .label {
            font-size: clamp(10px, 4cqi, 20px); font-weight: 900; color: var(--red);
            text-align: center; text-transform: uppercase; pointer-events: none;
        }
        .cell.done .label { color: var(--green); }
        .reset-btn {
            position: sticky; bottom: 0;
            width: 100%; padding: 15px;
            background: #000; border: none; border-top: 2px solid var(--red); color: var(--red);
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* === APP 2: NOTES === */
        #win-notes { width: 300px; height: 420px; top: 20px; left: 340px; z-index: 10; }
        #notes-list { flex: 1; padding-top: 10px; }
        .grid-row {
            display: grid; grid-template-columns: 15cqi 1fr;
            border-bottom: 1px solid var(--red); min-height: 50px;
        }
        .spacer-line {
            border-right: 1px solid var(--red);
            display: flex; align-items: center; justify-content: center;
            color: var(--red); font-weight: 900;
            font-size: clamp(12px, 5cqi, 24px);
        }
        .spacer-line.number::before { counter-increment: note-counter; content: counter(note-counter); }
        .note-content {
            padding: 10px; color: var(--red); outline: none;
            font-weight: 900; white-space: pre-wrap; word-break: break-all;
            font-size: clamp(14px, 5cqi, 28px);
        }
        .input-area { border-top: 2px solid var(--red); background: #000; position: sticky; bottom: 0; }

        /* === APP 3: CALCULATOR === */
        #win-calc { width: 350px; height: 450px; top: 20px; left: 660px; z-index: 10; }
        .calc-container { padding: 0; color: var(--red); height: 100%; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; flex: 1; }
        th, td { 
            padding: 5px; text-align: center; border: 1px solid var(--red); color: var(--red);
            font-size: clamp(10px, 3.5cqi, 18px);
        }
        thead tr th { padding-top: 15px; } 
        .table-input {
            width: 100%; background: #000; border: none; color: var(--red);
            font-family: 'Lexend Deca'; font-weight: 900; text-align: center; outline: none;
            font-size: inherit;
        }

        /* === APP 4: STOPWATCH === */
        #win-stopwatch { width: 250px; height: 200px; top: 460px; left: 20px; z-index: 10; }
        .timer-display {
            font-size: clamp(30px, 18cqi, 60px);
            text-align: center; color: var(--red); font-weight: 900;
            display: flex; align-items: center; justify-content: center; flex: 1;
        }
        .timer-controls {
            display: grid; grid-template-columns: 1fr 1fr;
            border-top: 2px solid var(--red);
            height: 50px;
        }
        .timer-btn {
            background: #000; border: none; color: var(--red);
            font-weight: 900; cursor: pointer; font-family: 'Lexend Deca'; font-size: 14px;
        }
        .timer-btn:first-child { border-right: 1px solid var(--red); }
        .timer-btn:active { background: var(--red); color: #000; }

        /* STATUS */
        .status { position: fixed; bottom: 10px; left: 10px; padding: 2px 6px; border: 1px solid var(--red); color: var(--red); font-size: 10px; background: #000; z-index: 9999; border-radius: 0px; pointer-events: none;}
    </style>
</head>
<body>

<div id="drag-shield"></div>
<div class="status" id="status">●</div>

<div id="win-routine" class="app-window">
    <div class="window-header"></div>
    <div class="window-content">
        <div class="grid" id="mainGrid">
            <div class="cell"><div class="label">Wake Up</div></div>
            <div class="cell"><div class="label">Water</div></div>
            <div class="cell"><div class="label">Pee</div></div>
            <div class="cell"><div class="label">Face</div></div>
            <div class="cell"><div class="label">Dry</div></div>
            <div class="cell"><div class="label">Poop</div></div>
            <div class="cell"><div class="label">Hands</div></div>
            <div class="cell"><div class="label">Tea</div></div>
            <div class="cell"><div class="label">Drink</div></div>
            <div class="cell"><div class="label">Cook</div></div>
            <div class="cell"><div class="label">Trade</div></div>
            <div class="cell"><div class="label">Eat</div></div>
            <div class="cell"><div class="label">Walk</div></div>
            <div class="cell"><div class="label">Sleep</div></div>
        </div>
        <button class="reset-btn" id="resetBtn">RESET GRID</button>
    </div>
    <div class="resize-handle"></div>
</div>

<div id="win-notes" class="app-window">
    <div class="window-header"></div>
    <div class="window-content">
        <div id="notes-list" style="counter-reset: note-counter;"></div>
        <div class="input-area grid-row">
            <div class="spacer-line" style="font-size:20px;">∞</div>
            <div class="note-content" id="main-input" contenteditable="true" spellcheck="false"></div>
        </div>
    </div>
    <div class="resize-handle"></div>
</div>

<div id="win-calc" class="app-window">
    <div class="window-header"></div>
    <div class="window-content">
        <div class="calc-container">
            <table id="calcTable">
                <thead>
                  <tr>
                    <th>Steps<br><input type="number" id="calc-steps" class="table-input" value="8" /></th>
                    <th>Mult<br><input type="number" id="calc-multiplier" class="table-input" value="2.3" /></th>
                    <th>Payout<br><input type="number" id="calc-payout" class="table-input" value="1.82" /></th>
                    <th>Total</th>
                    <th>Profit</th>
                  </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>
    <div class="resize-handle"></div>
</div>

<div id="win-stopwatch" class="app-window">
    <div class="window-header"></div>
    <div class="window-content">
        <div class="timer-display" id="display">00:00:00</div>
        <div class="timer-controls">
            <button class="timer-btn" id="startStopBtn">START</button>
            <button class="timer-btn" id="resetTimerBtn">RESET</button>
        </div>
    </div>
    <div class="resize-handle"></div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyALIZB9_NDhqafx5kzSjsegMH0cVu_QGKM",
        authDomain: "routine-26663.firebaseapp.com",
        projectId: "routine-26663",
        storageBucket: "routine-26663.firebasestorage.app",
        messagingSenderId: "31432340805",
        appId: "1:31432340805:web:0fc427c8f94aef0d4cba2c"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const USER_ID = 'user_main';
    const statusEl = document.getElementById('status');
    const updateStatus = (t, c) => { statusEl.textContent = t; statusEl.style.color = c; statusEl.style.borderColor = c; };

    // --- ENGINE ---
    let activeWin = null;
    let isDragging = false;
    let isResizing = false;
    let startX, startY, startLeft, startTop, startW, startH;
    let globalZ = 100;
    const SNAP_DIST = 15;
    const BORDER_SIZE = 4; // Thickness of body border

    const windows = document.querySelectorAll('.app-window');
    const body = document.body;

    const getPos = (e) => ({
        x: e.touches ? e.touches[0].clientX : e.clientX,
        y: e.touches ? e.touches[0].clientY : e.clientY
    });

    windows.forEach(win => {
        const header = win.querySelector('.window-header');
        const resizer = win.querySelector('.resize-handle');

        const activate = () => win.style.zIndex = ++globalZ;
        win.addEventListener('mousedown', activate);
        win.addEventListener('touchstart', activate, {passive: true});

        const initDrag = (e) => {
            if(e.target.closest('input') || e.target.closest('button')) return;
            e.preventDefault();
            activeWin = win; isDragging = true;
            body.classList.add('dragging');
            const pos = getPos(e);
            startX = pos.x; startY = pos.y;
            const rect = win.getBoundingClientRect();
            startLeft = rect.left; startTop = rect.top;
        };

        const initResize = (e) => {
            e.stopPropagation(); e.preventDefault();
            activeWin = win; isResizing = true;
            body.classList.add('dragging');
            const pos = getPos(e);
            startX = pos.x; startY = pos.y;
            const rect = win.getBoundingClientRect();
            startW = rect.width; startH = rect.height;
        };

        header.addEventListener('mousedown', initDrag);
        header.addEventListener('touchstart', initDrag, {passive: false});
        resizer.addEventListener('mousedown', initResize);
        resizer.addEventListener('touchstart', initResize, {passive: false});
    });

    const handleMove = (e) => {
        if (!activeWin) return;
        const pos = getPos(e);
        const dx = pos.x - startX;
        const dy = pos.y - startY;
        const maxW = window.innerWidth;
        const maxH = window.innerHeight;

        if (isDragging) {
            let newLeft = startLeft + dx;
            let newTop = startTop + dy;
            
            // Magnet & Clamping Logic
            // 1. Clamp to screen (Avoid going beyond border)
            // We clamp to 0 and (Screen - Width) to keep it inside the 4px border roughly.
            if (newLeft < 0) newLeft = 0;
            if (newTop < 0) newTop = 0;
            if (newLeft + activeWin.offsetWidth > maxW) newLeft = maxW - activeWin.offsetWidth;
            if (newTop + activeWin.offsetHeight > maxH) newTop = maxH - activeWin.offsetHeight;

            // 2. Snap to Edges (Magnet)
            if(Math.abs(newLeft) < SNAP_DIST) newLeft = 0;
            if(Math.abs(newTop) < SNAP_DIST) newTop = 0;
            if(Math.abs(newLeft + activeWin.offsetWidth - maxW) < SNAP_DIST) newLeft = maxW - activeWin.offsetWidth;
            if(Math.abs(newTop + activeWin.offsetHeight - maxH) < SNAP_DIST) newTop = maxH - activeWin.offsetHeight;

            // 3. Snap to Other Windows
            windows.forEach(other => {
                if(other === activeWin) return;
                const r = other.getBoundingClientRect();
                const activeR = { l: newLeft, t: newTop, r: newLeft + activeWin.offsetWidth, b: newTop + activeWin.offsetHeight };
                
                if(Math.abs(activeR.r - r.left) < SNAP_DIST) newLeft = r.left - activeWin.offsetWidth;
                if(Math.abs(activeR.l - r.right) < SNAP_DIST) newLeft = r.right;
                if(Math.abs(activeR.b - r.top) < SNAP_DIST) newTop = r.top - activeWin.offsetHeight;
                if(Math.abs(activeR.t - r.bottom) < SNAP_DIST) newTop = r.bottom;
            });

            activeWin.style.left = `${newLeft}px`;
            activeWin.style.top = `${newTop}px`;
        } 
        else if (isResizing) {
            let newW = Math.max(140, startW + dx);
            let newH = Math.max(140, startH + dy);
            
            // Prevent resizing beyond screen
            if (activeWin.offsetLeft + newW > maxW) newW = maxW - activeWin.offsetLeft;
            if (activeWin.offsetTop + newH > maxH) newH = maxH - activeWin.offsetTop;

            activeWin.style.width = `${newW}px`;
            activeWin.style.height = `${newH}px`;
        }
    };

    const stopAction = () => { isDragging = false; isResizing = false; activeWin = null; body.classList.remove('dragging'); };
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', handleMove, {passive: false});
    document.addEventListener('mouseup', stopAction);
    document.addEventListener('touchend', stopAction);

    // --- APP LOGIC (Same as before) ---
    // ROUTINE
    const saveRoutine = async () => {
        const cells = document.querySelectorAll('.cell');
        const state = Array.from(cells).map(c => c.classList.contains('done'));
        saveDB({ routine: state });
    };
    document.getElementById('mainGrid').addEventListener('click', e => {
        const c = e.target.closest('.cell');
        if(c) { c.classList.toggle('done'); saveRoutine(); }
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('done'));
        saveRoutine();
    });

    // NOTES
    let noteTimeout;
    const notesList = document.getElementById('notes-list');
    const mainInput = document.getElementById('main-input');
    function createNoteRow(text) {
        const row = document.createElement('div');
        row.className = 'grid-row';
        row.innerHTML = `<div class="spacer-line number"></div><div class="note-content" contenteditable="true">${text}</div>`;
        const content = row.querySelector('.note-content');
        content.addEventListener('input', () => { clearTimeout(noteTimeout); noteTimeout = setTimeout(saveNotes, 2000); });
        let sX = 0;
        content.addEventListener('touchstart', e => sX = e.touches[0].clientX, {passive: true});
        content.addEventListener('touchend', e => { if(e.changedTouches[0].clientX - sX < -80) { row.remove(); saveNotes(); }});
        return row;
    }
    const saveNotes = () => {
        const notes = Array.from(document.querySelectorAll('#notes-list .note-content')).map(n => n.innerText);
        saveDB({ notes });
    };
    mainInput.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if(mainInput.innerText.trim()) {
                notesList.appendChild(createNoteRow(mainInput.innerText.trim()));
                mainInput.innerText = "";
                saveNotes();
                notesList.scrollTop = notesList.scrollHeight;
            }
        }
    });

    // CALC
    let startBetValue = "70";
    function ordinal(n) { const s=["th","st","nd","rd"]; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
    function calculate() {
        const steps = parseInt(document.getElementById("calc-steps").value);
        const multiplier = parseFloat(document.getElementById("calc-multiplier").value);
        const payoutMult = parseFloat(document.getElementById("calc-payout").value);
        const sb = document.getElementById("startBet");
        if(sb) startBetValue = sb.value;
        let bet = parseFloat(startBetValue.replace(/^0+/, '')) || 0;
        let moneyNeeded = 0;
        let body = "";
        for (let i = 1; i <= steps; i++) {
            moneyNeeded += bet;
            const payout = bet * payoutMult;
            const profit = payout - moneyNeeded;
            const betCell = i === 1 ? `<input type="text" id="startBet" value="${startBetValue}" class="table-input" />` : Math.round(bet);
            body += `<tr><td>${ordinal(i)}</td><td>${betCell}</td><td>${Math.round(payout)}</td><td>${Math.round(moneyNeeded)}</td><td>${Math.round(profit)}</td></tr>`;
            bet *= multiplier;
        }
        document.getElementById("resultBody").innerHTML = body;
        const newSb = document.getElementById("startBet");
        if(newSb) {
            newSb.addEventListener('input', () => { startBetValue = newSb.value; calculate(); });
            newSb.addEventListener('mousedown', e => e.stopPropagation());
            newSb.addEventListener('touchstart', e => e.stopPropagation());
        }
    }
    document.querySelectorAll("#win-calc input").forEach(i => {
        i.addEventListener("input", calculate);
        i.addEventListener('mousedown', e => e.stopPropagation());
        i.addEventListener('touchstart', e => e.stopPropagation());
    });
    calculate();

    // TIMER
    let timerInt, ms = 0, secs = 0, running = false;
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startStopBtn');
    function updateTimer() { display.textContent = `${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}:${Math.floor(ms/10).toString().padStart(2,'0')}`; }
    startBtn.addEventListener('click', () => {
        if(running) { clearInterval(timerInt); startBtn.textContent="START"; running=false; }
        else { timerInt=setInterval(()=>{ ms+=10; if(ms>=1000){ms=0;secs++} updateTimer(); },10); startBtn.textContent="STOP"; running=true; }
    });
    document.getElementById('resetTimerBtn').addEventListener('click', () => {
        clearInterval(timerInt); running=false; ms=0; secs=0; updateTimer(); startBtn.textContent="START";
    });

    const saveDB = async (data) => {
        updateStatus('...', '#ffaa00');
        try { await setDoc(doc(db, 'routines', USER_ID), { ...data, lastUpdated: new Date().toISOString() }, { merge: true }); updateStatus('SAVED', '#00ff00'); } catch(e) { updateStatus('ERR', 'red'); }
    };
    window.addEventListener('load', async () => {
        updateStatus('LOAD', '#555');
        const cells = document.querySelectorAll('.cell');
        try {
            const snap = await getDoc(doc(db, 'routines', USER_ID));
            if(snap.exists()) {
                const data = snap.data();
                if(data.routine) data.routine.forEach((d, i) => { if(d && cells[i]) cells[i].classList.add('done'); });
                if(data.notes) data.notes.forEach(t => notesList.appendChild(createNoteRow(t)));
                updateStatus('READY', '#00ff00');
            }
        } catch(e) { updateStatus('OFFLINE', 'red'); }
    });
</script>
</body>
</html>
