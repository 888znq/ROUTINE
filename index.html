<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Routine + Notes Split</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-routine: #DFFF00; 
            --text-routine: #000000;
            --bg-notes: #000000;
            --red-notes: #FF0000;
            --line-weight: 6px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: var(--bg-routine);
            font-family: "Arial Black", sans-serif;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- LEFT: ROUTINE TRACKER --- */
        .routine-side {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            border-right: var(--line-weight) solid #000;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns for side-by-side view */
            gap: 0;
            border: 2px solid var(--text-routine);
        }

        .cell {
            background: var(--bg-routine);
            aspect-ratio: 1.5/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--text-routine);
            border-bottom: 2px solid var(--text-routine);
            cursor: pointer;
            padding: 5px;
        }

        .label { font-size: 12px; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1; }
        .mark { font-size: 24px; font-weight: 700; margin-top: 5px; }

        /* --- RIGHT: INFINITY NOTES --- */
        .notes-side {
            flex: 1;
            height: 100%;
            background-color: var(--bg-notes);
            display: flex;
            flex-direction: column;
            position: relative;
            counter-reset: note-counter;
        }

        #notes-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 50px 1fr;
            width: 100%;
            min-height: 70px;
            border-bottom: 4px solid var(--red-notes);
        }

        .spacer-line {
            border-right: 4px solid var(--red-notes);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--red-notes);
        }

        .spacer-line.infinity::after { content: "∞"; font-size: 1.5rem; }
        .spacer-line.number::before {
            counter-increment: note-counter;
            content: counter(note-counter) ".";
            font-size: 1rem;
            font-family: 'Lexend Deca';
        }

        .note-content {
            width: 100%;
            background: var(--bg-notes);
            color: var(--red-notes);
            padding: 15px;
            font-family: 'Lexend Deca';
            font-size: 1.2rem;
            font-weight: 900;
            outline: none;
            display: flex;
            align-items: center;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .input-area {
            position: sticky;
            bottom: 0;
            background: var(--bg-notes);
            border-top: 6px solid var(--red-notes);
        }

        /* --- UI ELEMENTS --- */
        .status { position: fixed; top: 10px; left: 10px; background: #000; color: #DFFF00; padding: 4px 8px; font-size: 10px; z-index: 100; border-radius: 4px; }

        /* Tablet/Mobile vertical stack */
        @media (max-width: 800px) {
            body { flex-direction: column; }
            .routine-side { border-right: none; border-bottom: 6px solid #000; height: 50%; }
            .notes-side { height: 50%; }
        }
    </style>
</head>
<body>

<div class="status" id="status">●</div>

<div class="routine-side">
    <div class="grid" id="mainGrid">
        <div class="cell"><div class="label">Wake Up</div></div>
        <div class="cell"><div class="label">Warm Water</div></div>
        <div class="cell"><div class="label">Pee</div></div>
        <div class="cell"><div class="label">Drink Water</div></div>
        <div class="cell"><div class="label">Wash Face</div></div>
        <div class="cell"><div class="label">Dry Face</div></div>
        <div class="cell"><div class="label">Poop</div></div>
        <div class="cell"><div class="label">Hand Wash</div></div>
        <div class="cell"><div class="label">Make Tea</div></div>
        <div class="cell"><div class="label">Drink Tea</div></div>
        <div class="cell"><div class="label">Cook Food</div></div>
        <div class="cell"><div class="label">Trading</div></div>
    </div>
</div>

<div class="notes-side">
    <div id="notes-list"></div>
    <div class="input-area grid-row">
        <div class="spacer-line infinity"></div>
        <div class="note-content" id="main-input" contenteditable="true" spellcheck="false" placeholder="New Note..."></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyALIZB9_NDhqafx5kzSjsegMH0cVu_QGKM",
        authDomain: "routine-26663.firebaseapp.com",
        projectId: "routine-26663",
        storageBucket: "routine-26663.firebasestorage.app",
        messagingSenderId: "31432340805",
        appId: "1:31432340805:web:0fc427c8f94aef0d4cba2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const USER_ID = 'user_main';
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const notesList = document.getElementById('notes-list');
    const mainInput = document.getElementById('main-input');

    const updateStatus = (t, c) => { statusEl.textContent = t; statusEl.style.background = c; };

    // SAVE ROUTINE
    const saveRoutine = async () => {
        updateStatus('...', '#ffaa00');
        const state = Array.from(cells).map(c => c.querySelector('.mark')?.textContent || '✗');
        try {
            await setDoc(doc(db, 'routines', USER_ID), { state, lastUpdated: new Date().toISOString() });
            updateStatus('☁ Saved', '#00ff00');
        } catch(e) { updateStatus('ERR', 'red'); }
    };

    document.getElementById('mainGrid').addEventListener('click', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const m = cell.querySelector('.mark');
        m.textContent = m.textContent === '✗' ? '✓' : '✗';
        saveRoutine();
    });

    // SAVE NOTES
    function saveNotes() {
        const notes = Array.from(document.querySelectorAll('#notes-list .note-content')).map(n => n.innerText);
        localStorage.setItem('infinity_notes_unified_v2', JSON.stringify(notes));
    }

    function createNoteRow(text) {
        const row = document.createElement('div');
        row.className = 'grid-row';
        row.innerHTML = `<div class="spacer-line number"></div><div class="note-content" contenteditable="true">${text}</div>`;
        const content = row.querySelector('.note-content');
        content.addEventListener('keyup', saveNotes);
        return row;
    }

    mainInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const val = mainInput.innerText.trim();
            if(val) {
                notesList.appendChild(createNoteRow(val));
                mainInput.innerText = "";
                saveNotes();
                notesList.scrollTop = notesList.scrollHeight;
            }
        }
    });

    window.addEventListener('load', async () => {
        // Load Routine
        try {
            const docSnap = await getDoc(doc(db, 'routines', USER_ID));
            const savedRoutine = docSnap.exists() ? docSnap.data().state : [];
            cells.forEach((c, i) => {
                const m = document.createElement('div');
                m.className = 'mark';
                m.textContent = savedRoutine[i] || '✗';
                c.appendChild(m);
            });
        } catch(e) { updateStatus('Offline', 'red'); }

        // Load Notes
        const savedNotes = JSON.parse(localStorage.getItem('infinity_notes_unified_v2') || '[]');
        savedNotes.forEach(t => notesList.appendChild(createNoteRow(t)));
    });
</script>
</body>
</html>
